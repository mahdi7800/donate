<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pouya’s Coffee Mug | Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF8E7;
            --text-color: #1a1a1a;
            --border-color: #000000;
            
            /* Color Palette */
            --yellow: #FFD93D;
            --green: #6BCB77;
            --blue: #4D96FF;
            --linkedin-blue: #0077B5; /* Official LinkedIn Color */
            --github-dark: #24292e;
            --white: #ffffff;
            
            --shadow-length: 6px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            /* Stylish dot pattern */
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 4px solid var(--border-color);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 12px 12px 0px var(--border-color);
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: -85px auto 20px;
            animation: float 3s ease-in-out infinite;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background-color: var(--yellow);
            border: 4px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
            overflow: hidden;
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            bottom: 5px;
            right: 0;
            background: #FF6B6B;
            color: white;
            font-size: 12px;
            font-weight: 900;
            padding: 5px 10px;
            border: 3px solid var(--border-color);
            border-radius: 20px;
            transform: rotate(-10deg);
            z-index: 11;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -1px;
            -webkit-text-stroke: 1.5px var(--border-color); 
            color: var(--white);
            text-shadow: 4px 4px 0px var(--border-color);
        }

        p.header-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 30px;
            font-weight: 700;
            color: #444;
        }

        /* --- Buttons --- */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px 25px;
            margin-bottom: 18px;
            text-decoration: none;
            color: var(--border-color);
            font-weight: 800;
            font-size: 1.15rem;
            border: 3px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            background: white;
            box-shadow: var(--shadow-length) var(--shadow-length) 0px var(--border-color);
            transform: translate(0, 0);
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: calc(var(--shadow-length) + 2px) calc(var(--shadow-length) + 2px) 0px var(--border-color);
        }

        .btn:active {
            transform: translate(var(--shadow-length), var(--shadow-length));
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box svg {
            width: 26px;
            height: 26px;
            display: block;
        }
        
        .arrow { font-size: 22px; line-height: 0; }

        /* Specific Colors */
        .btn-rial { background-color: var(--green); }
        .btn-crypto { background-color: var(--blue); }
        
        .btn-github { 
            background-color: var(--github-dark); 
            color: var(--white);
        }
        .btn-github .icon-box svg { fill: var(--white); }
        .btn-github .arrow { color: var(--white); }

        .btn-linkedin {
            background-color: var(--linkedin-blue);
            color: var(--white);
        }
        .btn-linkedin .icon-box svg { fill: var(--white); }
        .btn-linkedin .arrow { color: var(--white); }


        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--border-color);
            font-weight: 900;
            font-size: 0.9rem;
            opacity: 0.5;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 3px;
            background: var(--border-color);
            border-radius: 2px;
        }
        .divider span { margin: 0 15px; }


        /* Footer */
        .copyright {
            margin-top: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            opacity: 0.9;
        }
        
        .copyright a {
            text-decoration: none;
            color: inherit;
            border-bottom: 2px dashed var(--border-color);
            transition: all 0.2s;
        }
        
        .copyright a:hover {
            background-color: var(--yellow);
            border-bottom-style: solid;
        }

    </style>
</head>
